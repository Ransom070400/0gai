<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fira+Code:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>0G Wallet AI — Intelligent Wallet Analytics</title>
    <script>
      window.global = window;
      if (!window.process) {
        window.process = {
          env: {},
          version: 'v18.0.0',
          browser: true,
          nextTick: function(fn) { setTimeout(fn, 0); },
          versions: { node: '18.0.0' },
          platform: 'browser',
        };
      } else {
        if (!window.process.version) window.process.version = 'v18.0.0';
        if (!window.process.env) window.process.env = {};
        if (window.process.browser === undefined) window.process.browser = true;
        if (!window.process.nextTick) window.process.nextTick = function(fn) { setTimeout(fn, 0); };
      }
      if (!window.Buffer) {
        window.Buffer = { isBuffer: function() { return false; } };
      }
    </script>
  </head>
  <body class="bg-void-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
